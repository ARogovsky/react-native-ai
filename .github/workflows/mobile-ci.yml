name: mobile-ci

# Static gate for the ELLI mobile app (pure JS — no AWS needed): type-check + unit tests.
# Runs on the fork's main branch and PRs targeting it, only when app/ changes.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.5.1"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test
